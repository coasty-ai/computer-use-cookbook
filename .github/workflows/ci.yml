name: CI

on:
  push:
  pull_request:

# Tests are fully offline (all HTTP mocked); jobs only need network to
# install dependencies. No API keys, no spend.
jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: |
          python -m ruff check src tests examples
          python -m black --check src tests examples
      - name: Typecheck
        run: python -m mypy
      - name: Test
        run: python -m pytest -q

  typescript:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go/go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" && echo "$unformatted" && exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -count=1 ./...

  mock-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: |
          python -m ruff check src tests
          python -m black --check src tests
      - name: Typecheck
        run: python -m mypy
      - name: Test
        run: python -m pytest -q

  curl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: curl
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: shellcheck quickstart.sh tests/smoke.sh
      - name: Syntax check
        run: bash -n quickstart.sh && bash -n tests/smoke.sh
      - name: Offline smoke test
        run: bash tests/smoke.sh
